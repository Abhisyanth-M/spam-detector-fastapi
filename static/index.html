<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1976D2;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            text-align: center;
            display: none;
        }
        .spam {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        .not-spam {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
    </style>
</head>
<body>
    <h1>Email Spam Detector</h1>
    <p style="text-align:center">Paste any email below to check if it is spam or not.</p>

    <textarea id="emailInput" placeholder="Paste your email here..."></textarea>
    <button onclick="checkSpam()">Check Email</button>

    <div id="result"></div>

    <script>
        async function checkSpam() {
            const emailText = document.getElementById("emailInput").value;

            if (!emailText.trim()) {
                alert("Please paste an email first!");
                return;
            }

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email_text: emailText })
            });

            const data = await response.json();
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";

            if (data.is_spam) {
                resultDiv.className = "spam";
                resultDiv.innerHTML = `Spam Detected! Confidence: ${data.confidence}%`;
            } else {
                resultDiv.className = "not-spam";
                resultDiv.innerHTML = `Not Spam. Confidence: ${data.confidence}%`;
            }
        }
    </script>
</body>
</html>
